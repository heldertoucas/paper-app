<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip Mockup: Warm Paper</title>
    <style>
        :root {
            /* Palette 2: Warm Paper (Editorial Vibe) */
            --bg-main: #FDFBF7;       /* Warm off-white */
            --bg-editor: #FDFBF7;     /* Seamless background */
            --text-main: #2C2825;     /* Dark sepia/charcoal */
            --text-muted: #8C867D;    /* Warm gray */
            --accent: #D97706;        /* Burnt orange */
            --border: #E8E4DF;
            
            /* Typography */
            --font-ui: "Segoe UI", -apple-system, sans-serif;
            --font-editor: "Consolas", "Courier New", monospace;
        }

        body {
            background-color: #D1D5DB; /* Darker background to simulate desktop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--font-ui);
        }

        .window {
            width: 580px;
            height: 400px;
            background-color: var(--bg-main);
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            padding: 12px 16px 0;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            padding-bottom: 8px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .editor-container {
            flex-grow: 1;
            padding: 16px;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: transparent;
            border: none;
            padding: 8px;
            font-family: var(--font-editor);
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-main);
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .status {
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="tabs">
            <div class="tab active">1: Inbox</div>
            <div class="tab">2: Família</div>
            <div class="tab">3: Passaporte</div>
            <div class="tab">4: Futuro</div>
            <div class="tab">5: Freelance</div>
        </div>
        
        <div class="editor-container">
            <textarea placeholder="Capture a thought..." spellcheck="false">Title of the quick thought

Here is the body of the note. The font is Consolas, and the color palette uses warm, sepia-toned greys for an editorial, non-fatiguing feel.

[Source](https://example.com)</textarea>
        </div>

        <div class="status">
            <span>Domain: system | Context: msedge.exe</span>
            <span>[Tab] Append Context</span>
        </div>
    </div>

</body>
</html>
