<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip Mockup: Modern Crisp</title>
    <style>
        :root {
            /* Palette 1: Modern Crisp (Windows 11 Vibe) */
            --bg-main: #F3F4F6;       /* Light gray background */
            --bg-editor: #FFFFFF;     /* Pure white editor */
            --text-main: #111827;     /* Deep charcoal */
            --text-muted: #6B7280;    /* Gray status */
            --accent: #2563EB;        /* Royal blue */
            --border: #E5E7EB;
            
            /* Typography */
            --font-ui: "Segoe UI Variable Display", "Segoe UI", -apple-system, sans-serif;
            --font-editor: "Cascadia Mono", "Consolas", monospace;
        }

        body {
            background-color: #D1D5DB; /* Darker background to simulate desktop */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--font-ui);
        }

        .window {
            width: 580px;
            height: 400px;
            background-color: var(--bg-main);
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            padding: 12px 16px 0;
            gap: 16px;
        }

        .tab {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            padding-bottom: 8px;
            cursor: pointer;
            letter-spacing: 0.3px;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .editor-container {
            flex-grow: 1;
            padding: 16px;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: var(--bg-editor);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            font-family: var(--font-editor);
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: #BFDBFE;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .status {
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="tabs">
            <div class="tab active">1: Inbox</div>
            <div class="tab">2: Família</div>
            <div class="tab">3: Passaporte</div>
            <div class="tab">4: Futuro</div>
            <div class="tab">5: Freelance</div>
        </div>
        
        <div class="editor-container">
            <textarea placeholder="Capture a thought..." spellcheck="false">Title of the quick thought

Here is the body of the note. The font is Cascadia Mono, which looks crisp and modern for plaintext markdown capture.

[Source](https://example.com)</textarea>
        </div>

        <div class="status">
            <span>Domain: system | Context: msedge.exe</span>
            <span>[Tab] Append Context</span>
        </div>
    </div>

</body>
</html>
